---
# =============================================================================
# Little Wolf Acres — Shared Ansible Variables
# =============================================================================
# Single source of truth for all non-secret infrastructure values.
# Every Ansible playbook in this repo includes this file via vars_files.
#
# Secrets live in ansible/vars/vault.yml (ansible-vault encrypted).
# Reference secrets here as: "{{ vault_<name> }}"
# =============================================================================

# -----------------------------------------------------------------------------
# Network — IP addresses
# -----------------------------------------------------------------------------
ip_er605:              "192.168.0.1"
ip_eap245_foyer:       "192.168.0.2"
ip_reolink_nvr:        "192.168.0.4"
ip_eap245_yarn_studio: "192.168.0.5"
ip_eap225_outdoor:     ""          # assign when EAP225-Outdoor is installed
ip_sg2218p:            ""          # assign when SG2218P switch is installed
ip_apex:               "192.168.0.19"
ip_monolith:           "192.168.0.20"
ip_watchtower:         "192.168.0.21"
ip_studio:             "192.168.0.109"

# -----------------------------------------------------------------------------
# Network — Hostnames and FQDNs
# -----------------------------------------------------------------------------
homelab_domain:    "littlewolfacres.com"
fqdn_apex:         "apex.littlewolfacres.com"
fqdn_monolith:     "monolith.littlewolfacres.com"
fqdn_watchtower:   "watchtower.littlewolfacres.com"
fqdn_grafana:      "grafana.littlewolfacres.com"
fqdn_navidrome:    "navidrome.littlewolfacres.com"
fqdn_studio:       "studio.littlewolfacres.com"
fqdn_argocd:       "argocd.littlewolfacres.com"

# -----------------------------------------------------------------------------
# Ports
# -----------------------------------------------------------------------------
port_ssh:                22
port_dns:                53
port_samba_netbios:      139
port_samba:              445
port_unbound:            5335
port_adguard_ui:         3000
port_grafana:            3001
port_prometheus:         9090
port_alertmanager:       9093
port_node_exporter:      9100
port_blackbox_exporter:  9115
port_snmp_exporter:      9116
port_adguard_exporter:   9618
port_tmobile_exporter:   9719
port_reolink_exporter:   9720
port_netdata:            19999
port_synapse_mcp:        30800
port_kube_state_metrics: 30900   # NodePort on Monolith; 30800 taken by synapse-mcp
port_argocd_nodeport:    30880   # ArgoCD UI fallback (primary: Traefik ingress)
port_argocd_metrics_controller: 30885  # argocd-application-controller metrics → Prometheus
port_argocd_metrics_server:     30883  # argocd-server metrics → Prometheus
port_loki:               3100
port_promtail:           9080
port_promtail_syslog:    1514   # non-privileged syslog receiver (ER605 → Watchtower)
port_scribe:             8765
port_argus_mcp:          9800

# -----------------------------------------------------------------------------
# Obelisk — KubeVirt Windows 11 VM
# -----------------------------------------------------------------------------
fqdn_obelisk:                  "obelisk.littlewolfacres.com"
port_obelisk_rdp:              33389   # NodePort — RDP (3389 inside VM)
port_obelisk_metrics:          39182   # NodePort — windows_exporter (9182 inside VM)

# -----------------------------------------------------------------------------
# SSH / Ansible connection
# -----------------------------------------------------------------------------
ansible_ssh_key:         "~/.ssh/id_ed25519"

# Per-host users (referenced in inventory or playbook connection vars)
ssh_user_monolith:       "gh-runner"
ssh_user_watchtower:     "speddling"
ssh_user_apex:           "speddling"

# -----------------------------------------------------------------------------
# Monolith — storage mount points
# -----------------------------------------------------------------------------
monolith_ssd_a:    "/mnt/ssd-a"    # k8s local-path provisioner
monolith_ssd_b:    "/mnt/ssd-b"    # isolated workspace / client jumpbox
monolith_hdd_c:    "/mnt/hdd-c"    # music library / bulk storage
monolith_hdd_d:    "/mnt/hdd-d"    # nightly mirror of hdd-c

# -----------------------------------------------------------------------------
# Monolith — hdd mirror
# -----------------------------------------------------------------------------
mirror_source:      "/mnt/hdd-c/"
mirror_dest:        "/mnt/hdd-d/"
mirror_on_calendar: "*-*-* 02:00:00"
mirror_log:         "/var/log/mirror-hdd.log"

# -----------------------------------------------------------------------------
# Monolith — Samba file shares
# -----------------------------------------------------------------------------
samba_user:          "vault"
james_user:          "james"
vault_share_name:    "vault"
vault_share_path:    "/mnt/ssd-b/vault"
studio_share_name:   "studio-archive"
studio_share_path:   "/mnt/lab-backups/studio-archive"
music_share_name:    "music-library"
music_share_path:    "/mnt/hdd-c/music-library"
# Passwords: vault_samba_password, vault_james_password (see vault.yml)

# -----------------------------------------------------------------------------
# Watchtower — Alertmanager
# -----------------------------------------------------------------------------
alertmanager_slack_channel:          "#sentinel"
alertmanager_slack_username:         "Watchtower"
alertmanager_slack_icon:             ":sentinel:"
alertmanager_resolve_timeout:        "5m"
alertmanager_group_wait:             "30s"
alertmanager_group_interval:         "5m"
alertmanager_repeat_interval:        "4h"
# Webhook URL: vault_slack_webhook_url (see vault.yml)

# -----------------------------------------------------------------------------
# Watchtower — Daily Summary
# -----------------------------------------------------------------------------
daily_summary_timezone:              "America/New_York"

# -----------------------------------------------------------------------------
# Watchtower — SNMP
# -----------------------------------------------------------------------------
snmp_community:     "littlewolfacres"
snmp_auth_module:   "littlewolfacres_v2"
# SNMPv3 user: vault_snmp_v3_user (see vault.yml)

# -----------------------------------------------------------------------------
# Watchtower — Reolink NVR exporter
# -----------------------------------------------------------------------------
reolink_nvr_host:     "{{ ip_reolink_nvr }}"
reolink_nvr_user:     "admin"
reolink_scrape_port:  "{{ port_reolink_exporter }}"
reolink_poll_interval: 30
# NVR password: vault_reolink_nvr_password (see vault.yml)

# -----------------------------------------------------------------------------
# Watchtower — NUT (UPS monitoring)
# -----------------------------------------------------------------------------
nut_enabled:         false
nut_ups_name:        "cyberpower"
nut_ups_driver:      "usbhid-ups"
nut_ups_port:        "auto"
nut_monitor_user:    "monuser"
# Monitor password: vault_nut_monitor_password (see vault.yml)

# -----------------------------------------------------------------------------
# ArgoCD — repository credential management
# -----------------------------------------------------------------------------
argocd_namespace:        "argocd"
argocd_repo_secret_name: "homelab-repo"
argocd_repo_url:         "https://github.com/speddling/lwa-homelab"
argocd_repo_username:    "speddling"
# Token: vault_argocd_github_token (see vault.yml)
# Rotation: Actions → Rotate ArgoCD Credentials → Run workflow

# -----------------------------------------------------------------------------
# Apex — Scribe MCP server
# -----------------------------------------------------------------------------
scribe_port:        "{{ port_scribe }}"
scribe_repo_roots:  "/Users/speddling/lwa-homelab:/Users/speddling/lwa-main"
scribe_python:      "/opt/local/bin/python3.12"
scribe_venv:        "{{ ansible_env.HOME }}/.venv/scribe"
scribe_label:       "com.littlewolfacres.scribe"

# -----------------------------------------------------------------------------
# Apex — Zombatron Importer (Slack bot)
# -----------------------------------------------------------------------------
zombatron_importer_label:         "com.littlewolfacres.zombatron-importer"
zombatron_importer_venv:          "{{ ansible_env.HOME }}/.venv/zombatron-importer"
zombatron_importer_python:        "/opt/local/bin/python3.12"
zombatron_importer_slack_channel: "C0B5C20R1SB"
zombatron_importer_monolith_host: "{{ ip_monolith }}"
zombatron_importer_monolith_user: "{{ ssh_user_monolith }}"
zombatron_importer_import_path:   "/opt/minecraft/import/realm.mcworld"
zombatron_importer_github_repo:   "speddling/lwa-homelab"
zombatron_importer_workflow:      "slack-minecraft-import.yml"
# Secrets: vault_slack_zombatron_bot_token, vault_slack_zombatron_app_token,
#          vault_github_actions_pat (see vault.yml)
