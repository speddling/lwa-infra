apiVersion: v1
kind: ServiceAccount
metadata:
  name: synapse
  namespace: synapse

---
# Custom ClusterRole — read-only cluster access.
# The built-in "view" role excludes pods/log intentionally (logs can contain secrets).
# We add it back explicitly so the log-tailing tool works.
# No write access, no exec, no secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: synapse-reader
rules:
  - apiGroups: [""]
    resources: [pods, nodes, namespaces, persistentvolumeclaims, events, services]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: synapse-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: synapse-reader
subjects:
  - kind: ServiceAccount
    name: synapse
    namespace: synapse
