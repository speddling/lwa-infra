# =============================================================================
# LWA Cutover Inventory — used by cutover_preflight.yml ONLY.
# =============================================================================
# BEFORE RUNNING PREFLIGHT: verify current IPs and update ansible_host:
#   On each server: ip addr show | grep 'inet '
# =============================================================================

[cutover_targets]
monolith ansible_host=192.168.0.112 ansible_user=speddling
watchtower ansible_host=192.168.0.113 ansible_user=speddling

[cutover_targets:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
