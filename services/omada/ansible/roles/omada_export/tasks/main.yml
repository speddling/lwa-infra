---
# Phase 1 — read-only export. Makes NO changes to the controller.
# Proves auth + endpoint coverage and writes config-as-backup JSON.

- name: Authenticate to Omada Open API
  ansible.builtin.include_tasks: auth.yml

- name: Ensure state directory exists
  ansible.builtin.file:
    path: "{{ omada_state_dir }}"
    state: directory
    mode: '0755'

# Sites first — most object endpoints are scoped by siteId.
- name: List sites
  ansible.builtin.uri:
    url: "{{ omada_api_base }}/openapi/v1/{{ omada_id }}/sites?pageSize=100&page=1"
    method: GET
    headers:
      Authorization: "AccessToken={{ omada_access_token }}"
      Content-Type: application/json
    validate_certs: "{{ omada_validate_certs }}"
    return_content: true
  register: omada_sites
  no_log: true

- name: Write sites snapshot
  ansible.builtin.copy:
    content: "{{ omada_sites.json | to_nice_json }}\n"
    dest: "{{ omada_state_dir }}/sites.json"
    mode: '0644'

- name: Extract site ids
  ansible.builtin.set_fact:
    omada_site_ids: "{{ omada_sites.json.result.data | map(attribute='siteId') | list }}"

# Per-site device inventory.
- name: Export device inventory per site
  ansible.builtin.uri:
    url: "{{ omada_api_base }}/openapi/v1/{{ omada_id }}/sites/{{ item }}/devices"
    method: GET
    headers:
      Authorization: "AccessToken={{ omada_access_token }}"
      Content-Type: application/json
    validate_certs: "{{ omada_validate_certs }}"
    return_content: true
  loop: "{{ omada_site_ids }}"
  register: omada_devices
  no_log: true

- name: Write device snapshots
  ansible.builtin.copy:
    content: "{{ item.json | to_nice_json }}\n"
    dest: "{{ omada_state_dir }}/devices-{{ item.item }}.json"
    mode: '0644'
  loop: "{{ omada_devices.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Report what was captured
  ansible.builtin.debug:
    msg: >-
      Exported {{ omada_site_ids | length }} site(s) to {{ omada_state_dir }}.
      Review sites.json + devices-*.json, then commit as config-as-backup.
      Next: confirm which VLAN/DHCP/SSID endpoints this controller exposes
      before building the reconcile phase.
