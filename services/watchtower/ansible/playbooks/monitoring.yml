---
- name: Configure monitoring layer
  hosts: watchtower
  become: yes

  vars_files:
    - "{{ playbook_dir }}/../../../../ansible/vars/main.yml"
    - "{{ playbook_dir }}/../../../../ansible/vars/vault.yml"

  roles:
    - prometheus
    - alertmanager
    - loki
    - promtail
    - netdata
    - grafana
    - daily_summary
    - argus
    - nut
