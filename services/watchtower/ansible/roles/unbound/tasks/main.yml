---
- name: Install unbound and dns utilities
  apt:
    name:
      - unbound
      - dnsutils
    state: present
    update_cache: yes

- name: Download root hints
  get_url:
    url: https://www.internic.net/domain/named.root
    dest: /var/lib/unbound/root.hints
    owner: root
    group: root
    mode: '0644'

- name: Disable systemd-resolved stub listener
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'

- name: Restart systemd-resolved to release port 53
  systemd:
    name: systemd-resolved
    state: restarted

- name: Deploy unbound config
  template:
    src: watchtower.conf.j2
    dest: /etc/unbound/unbound.conf.d/watchtower.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart unbound

- name: Enable and start unbound
  systemd:
    name: unbound
    enabled: yes
    state: started
