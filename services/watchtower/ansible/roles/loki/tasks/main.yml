---
- name: Create loki system user
  ansible.builtin.user:
    name: loki
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Install unzip (required for Loki binary extraction)
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: false

- name: Check if loki is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/loki
  register: loki_binary

- name: Download loki binary
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v3.1.0/loki-linux-amd64.zip"
    dest: /tmp/loki.zip
    mode: '0644'
  when: not loki_binary.stat.exists

- name: Unzip loki
  ansible.builtin.unarchive:
    src: /tmp/loki.zip
    dest: /tmp/
    remote_src: true
  when: not loki_binary.stat.exists

- name: Install loki binary
  ansible.builtin.copy:
    src: /tmp/loki-linux-amd64
    dest: /usr/local/bin/loki
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  when: not loki_binary.stat.exists

- name: Create loki config and storage directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: loki
    mode: '0755'
  loop:
    - /etc/loki
    - /var/lib/loki
    - /var/lib/loki/chunks
    - /var/lib/loki/rules
    - /var/lib/loki/compactor

- name: Deploy loki config
  ansible.builtin.template:
    src: loki.yml.j2
    dest: /etc/loki/loki.yml
    owner: loki
    group: loki
    mode: '0644'
  notify: Restart loki

- name: Deploy loki systemd unit
  ansible.builtin.template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart loki

- name: Enable and start loki
  ansible.builtin.systemd:
    name: loki
    enabled: true
    state: started
