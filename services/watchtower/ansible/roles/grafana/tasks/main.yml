---
- name: Install Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana apt repository
  apt_repository:
    repo: deb https://apt.grafana.com stable main
    state: present
    filename: grafana

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Deploy Grafana config
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana datasource provisioning
  template:
    src: datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana dashboard provisioning
  template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/homelab.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Create dashboard directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'

- name: Find all dashboard files currently on disk
  ansible.builtin.find:
    paths: /var/lib/grafana/dashboards
    patterns: '*.json'
  register: existing_dashboards

- name: Remove any dashboard files not in our managed list
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_dashboards.files }}"
  when: item.path | basename not in managed_dashboards
  vars:
    managed_dashboards:
      - node-exporter-full.json
      - k3s-cluster.json
      - blackbox-exporter.json
      - snmp-interfaces.json
      - tmobile-gateway.json
      - reolink-nvr.json
  notify: restart grafana

- name: Download Node Exporter Full dashboard (ID 1860)
  ansible.builtin.get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/latest/download
    dest: /var/lib/grafana/dashboards/node-exporter-full.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Patch Node Exporter Full datasource variable
  ansible.builtin.replace:
    path: /var/lib/grafana/dashboards/node-exporter-full.json
    regexp: '\$\{DS_PROMETHEUS[^}]*\}'
    replace: 'PBFA97CFB590B2093'
  notify: restart grafana

- name: Deploy k3s cluster dashboard (custom)
  ansible.builtin.copy:
    src: k3s-cluster.json
    dest: /var/lib/grafana/dashboards/k3s-cluster.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Blackbox probes dashboard (custom)
  ansible.builtin.copy:
    src: blackbox-probes.json
    dest: /var/lib/grafana/dashboards/blackbox-exporter.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy SNMP interfaces dashboard (custom)
  ansible.builtin.copy:
    src: snmp-interfaces.json
    dest: /var/lib/grafana/dashboards/snmp-interfaces.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy T-Mobile 5G Gateway dashboard (custom)
  ansible.builtin.copy:
    src: tmobile-gateway.json
    dest: /var/lib/grafana/dashboards/tmobile-gateway.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Reolink NVR dashboard (custom)
  ansible.builtin.copy:
    src: reolink-nvr.json
    dest: /var/lib/grafana/dashboards/reolink-nvr.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Grafana alerting provisioning
  template:
    src: alerting.yml.j2
    dest: /etc/grafana/provisioning/alerting/sentinel.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana alert rules
  template:
    src: alert_rules.yml.j2
    dest: /etc/grafana/provisioning/alerting/alert_rules.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started

- name: Ensure Grafana is restarted to pick up provisioning changes
  systemd:
    name: grafana-server
    state: restarted

# ── Purge stale dashboards via Grafana API ────────────────────────────────
# File-based cleanup can't remove dashboards that live only in Grafana's
# SQLite database (manually imported or orphaned after a UID change).
# Use the API from localhost so we can reach it without network restrictions.

- name: Wait for Grafana to be ready after restart
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/health"
    status_code: 200
  register: grafana_health
  retries: 12
  delay: 5
  until: grafana_health.status == 200

- name: Search for stale T-Mobile dashboards (not managed by us)
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/search?query=T-Mobile&type=dash-db"
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    return_content: true
  register: tmobile_search

- name: Delete stale T-Mobile dashboards
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/dashboards/uid/{{ item.uid }}"
    method: DELETE
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    status_code: [200, 404]
  loop: "{{ tmobile_search.json }}"
  when: item.uid is defined and item.uid != 'lwa-tmobile-gateway'

- name: Search for stale SNMP dashboards (not managed by us)
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/search?query=SNMP&type=dash-db"
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    return_content: true
  register: snmp_search

- name: Delete stale SNMP dashboards
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/dashboards/uid/{{ item.uid }}"
    method: DELETE
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    status_code: [200, 404]
  loop: "{{ snmp_search.json }}"
  when: item.uid is defined and item.uid != 'lwa-snmp-interfaces'
