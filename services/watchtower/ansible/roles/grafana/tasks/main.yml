---
- name: Install Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana apt repository
  apt_repository:
    repo: deb https://apt.grafana.com stable main
    state: present
    filename: grafana

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Deploy Grafana config
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana datasource provisioning
  template:
    src: datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana dashboard provisioning
  template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/homelab.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

# Remove any stale provisioner YAML configs that we don't own.
# A leftover config pointing to a different directory would re-provision
# orphan dashboards on every Grafana restart, making them undeletable via API.
- name: Find all dashboard provisioner configs
  ansible.builtin.find:
    paths: /etc/grafana/provisioning/dashboards
    patterns: '*.yml,*.yaml'
  register: provisioner_configs

- name: Remove any dashboard provisioner configs that are not homelab.yml
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ provisioner_configs.files }}"
  when: item.path | basename != 'homelab.yml'
  notify: restart grafana

- name: Create dashboard directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'

- name: Find all dashboard files currently on disk
  ansible.builtin.find:
    paths: /var/lib/grafana/dashboards
    patterns: '*.json'
  register: existing_dashboards

- name: Remove any dashboard files not in our managed list
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_dashboards.files }}"
  when: item.path | basename not in managed_dashboards
  vars:
    managed_dashboards:
      - node-exporter-full.json
      - k3s-cluster.json
      - blackbox-exporter.json
      - snmp-interfaces.json
      - tmobile-gateway.json
      - reolink-nvr.json
  notify: restart grafana

- name: Download Node Exporter Full dashboard (ID 1860)
  ansible.builtin.get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/latest/download
    dest: /var/lib/grafana/dashboards/node-exporter-full.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Patch Node Exporter Full datasource variable
  ansible.builtin.replace:
    path: /var/lib/grafana/dashboards/node-exporter-full.json
    regexp: '\$\{DS_PROMETHEUS[^}]*\}'
    replace: 'PBFA97CFB590B2093'
  notify: restart grafana

- name: Deploy k3s cluster dashboard (custom)
  ansible.builtin.copy:
    src: k3s-cluster.json
    dest: /var/lib/grafana/dashboards/k3s-cluster.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Blackbox probes dashboard (custom)
  ansible.builtin.copy:
    src: blackbox-probes.json
    dest: /var/lib/grafana/dashboards/blackbox-exporter.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy SNMP interfaces dashboard (custom)
  ansible.builtin.copy:
    src: snmp-interfaces.json
    dest: /var/lib/grafana/dashboards/snmp-interfaces.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy T-Mobile 5G Gateway dashboard (custom)
  ansible.builtin.copy:
    src: tmobile-gateway.json
    dest: /var/lib/grafana/dashboards/tmobile-gateway.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Reolink NVR dashboard (custom)
  ansible.builtin.copy:
    src: reolink-nvr.json
    dest: /var/lib/grafana/dashboards/reolink-nvr.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Grafana alerting provisioning
  template:
    src: alerting.yml.j2
    dest: /etc/grafana/provisioning/alerting/sentinel.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana alert rules
  template:
    src: alert_rules.yml.j2
    dest: /etc/grafana/provisioning/alerting/alert_rules.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started

- name: Flush handlers to apply any pending Grafana restart
  ansible.builtin.meta: flush_handlers

# ── DB maintenance ────────────────────────────────────────────────────────
# The dashboard table is empty — this Grafana version uses unified storage
# (resource table) not the legacy dashboard table. We need to:
#   1. Find the right table/file containing the orphan dashboards
#   2. Remove orphan provisioner files from any extra provisioning dirs
#   3. Let Grafana's own provisioner cleanup handle deletion on restart
#      (disableDeletion: false means it removes provisioned dashboards
#       whose files are gone when it rescans)
#
# This script dumps full diagnostics so we can see exactly what's in the
# DB and which tables/files contain the orphan UIDs.

- name: Read node-exporter-full UID from disk
  ansible.builtin.slurp:
    src: /var/lib/grafana/dashboards/node-exporter-full.json
  register: nef_raw

- name: Set node-exporter-full UID fact
  ansible.builtin.set_fact:
    nef_uid: "{{ (nef_raw.content | b64decode | from_json).uid }}"

- name: Stop Grafana for DB maintenance
  systemd:
    name: grafana-server
    state: stopped

- name: Purge unmanaged dashboards from unified storage
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      python3 << 'PYEOF'
      import json, os, glob, sqlite3

      MANAGED_UIDS = {
          'lwa-blackbox-probes', 'lwa-k3s-cluster', 'lwa-reolink-nvr',
          'lwa-snmp-interfaces', 'lwa-tmobile-gateway',
          '{{ nef_uid }}'
      }

      conn = sqlite3.connect('/var/lib/grafana/grafana.db')
      c = conn.cursor()

      # Show all dashboard rows currently in unified storage
      print("=== resource table: dashboard.grafana.app/dashboards ===")
      c.execute("""
          SELECT name FROM resource
          WHERE \"group\" = 'dashboard.grafana.app'
          AND resource = 'dashboards'
          ORDER BY name
      """)
      rows = c.fetchall()
      for (name,) in rows:
          tag = 'managed' if name in MANAGED_UIDS else 'ORPHAN'
          print(f"  [{tag}] {name}")

      # Delete ALL dashboard rows — managed ones re-provisioned from files,
      # orphans won't come back because their files are gone.
      # Scoped strictly to group+resource so folders/advisor/etc are untouched.
      c.execute("""
          DELETE FROM resource
          WHERE \"group\" = 'dashboard.grafana.app'
          AND resource = 'dashboards'
      """)
      print(f"\nDeleted {conn.total_changes} rows from resource table")
      print("Managed dashboards will be re-provisioned from files on Grafana startup.")
      print("Orphans won't come back — no files exist for them.")

      conn.commit()
      conn.close()
      PYEOF
  register: db_inspect
  changed_when: true

- name: Show DB inspection output
  ansible.builtin.debug:
    var: db_inspect.stdout_lines

- name: Start Grafana after DB maintenance
  systemd:
    name: grafana-server
    state: started

# ── API purge: safety net for non-provisioned orphans ────────────────────

- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/health"
    status_code: 200
  register: grafana_health
  retries: 12
  delay: 5
  until: grafana_health.status == 200

- name: Get all dashboards from Grafana
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/search?type=dash-db&limit=100"
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    return_content: true
  register: all_grafana_dashboards

- name: Build list of unmanaged dashboard UIDs to purge
  ansible.builtin.set_fact:
    grafana_orphan_uids: >-
      {{ all_grafana_dashboards.json
         | selectattr('uid', 'defined')
         | rejectattr('uid', 'in', managed_dashboard_uids + [nef_uid])
         | map(attribute='uid')
         | list }}
  vars:
    managed_dashboard_uids:
      - lwa-blackbox-probes
      - lwa-k3s-cluster
      - lwa-reolink-nvr
      - lwa-snmp-interfaces
      - lwa-tmobile-gateway

- name: Delete each unmanaged dashboard (API)
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/dashboards/uid/{{ item }}"
    method: DELETE
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    status_code: [200, 400, 404]
  loop: "{{ grafana_orphan_uids }}"
  register: api_deletes

- name: Show API delete results
  ansible.builtin.debug:
    msg: "{{ item.item }}: HTTP {{ item.status }} — {{ item.json.message | default('deleted') }}"
  loop: "{{ api_deletes.results }}"
