---
- name: Install Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana apt repository
  apt_repository:
    repo: deb https://apt.grafana.com stable main
    state: present
    filename: grafana

- name: Install Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Deploy Grafana config
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana datasource provisioning
  template:
    src: datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana dashboard provisioning
  template:
    src: dashboards.yml.j2
    dest: /etc/grafana/provisioning/dashboards/homelab.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Create dashboard directory
  file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'

- name: Find all dashboard files currently on disk
  ansible.builtin.find:
    paths: /var/lib/grafana/dashboards
    patterns: '*.json'
  register: existing_dashboards

- name: Remove any dashboard files not in our managed list
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_dashboards.files }}"
  when: item.path | basename not in managed_dashboards
  vars:
    managed_dashboards:
      - node-exporter-full.json
      - k3s-cluster.json
      - blackbox-exporter.json
      - snmp-interfaces.json
      - tmobile-gateway.json
      - reolink-nvr.json
  notify: restart grafana

- name: Download Node Exporter Full dashboard (ID 1860)
  ansible.builtin.get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/latest/download
    dest: /var/lib/grafana/dashboards/node-exporter-full.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Patch Node Exporter Full datasource variable
  ansible.builtin.replace:
    path: /var/lib/grafana/dashboards/node-exporter-full.json
    regexp: '\$\{DS_PROMETHEUS[^}]*\}'
    replace: 'PBFA97CFB590B2093'
  notify: restart grafana

- name: Deploy k3s cluster dashboard (custom)
  ansible.builtin.copy:
    src: k3s-cluster.json
    dest: /var/lib/grafana/dashboards/k3s-cluster.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Blackbox probes dashboard (custom)
  ansible.builtin.copy:
    src: blackbox-probes.json
    dest: /var/lib/grafana/dashboards/blackbox-exporter.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy SNMP interfaces dashboard (custom)
  ansible.builtin.copy:
    src: snmp-interfaces.json
    dest: /var/lib/grafana/dashboards/snmp-interfaces.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy T-Mobile 5G Gateway dashboard (custom)
  ansible.builtin.copy:
    src: tmobile-gateway.json
    dest: /var/lib/grafana/dashboards/tmobile-gateway.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Reolink NVR dashboard (custom)
  ansible.builtin.copy:
    src: reolink-nvr.json
    dest: /var/lib/grafana/dashboards/reolink-nvr.json
    owner: grafana
    group: grafana
    mode: '0644'
  notify: restart grafana

- name: Deploy Grafana alerting provisioning
  template:
    src: alerting.yml.j2
    dest: /etc/grafana/provisioning/alerting/sentinel.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Deploy Grafana alert rules
  template:
    src: alert_rules.yml.j2
    dest: /etc/grafana/provisioning/alerting/alert_rules.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Enable and start Grafana
  systemd:
    name: grafana-server
    enabled: yes
    state: started

# Flush pending handlers so Grafana has the latest provisioning before
# we stop it for SQLite maintenance.
- name: Flush handlers to apply any pending Grafana restart
  ansible.builtin.meta: flush_handlers

# ── SQLite maintenance ────────────────────────────────────────────────────
# Previous attempts with sqlite3 CLI deleted 0 rows — either the schema
# differs from what we expected, or Grafana is re-inserting from files.
# Using Python to get full visibility: lists every provisioning file and
# its UID, deletes any file with an orphan UID, prints the full dashboard
# table, then deletes unmanaged rows. Output is visible in the deploy log
# so we can see exactly what's happening.

- name: Read node-exporter-full UID from disk
  ansible.builtin.slurp:
    src: /var/lib/grafana/dashboards/node-exporter-full.json
  register: nef_raw

- name: Set node-exporter-full UID fact
  ansible.builtin.set_fact:
    nef_uid: "{{ (nef_raw.content | b64decode | from_json).uid }}"

- name: Stop Grafana for SQLite maintenance
  systemd:
    name: grafana-server
    state: stopped

- name: Purge unmanaged dashboards — inspect files and DB, delete orphans
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      python3 << 'PYEOF'
      import json, os, glob, sqlite3, sys

      MANAGED_UIDS = {
          'lwa-blackbox-probes', 'lwa-k3s-cluster', 'lwa-reolink-nvr',
          'lwa-snmp-interfaces', 'lwa-tmobile-gateway',
          '{{ nef_uid }}'
      }

      print("=== Provisioning directory files ===")
      for f in sorted(glob.glob('/var/lib/grafana/dashboards/*.json')):
          try:
              data = json.load(open(f))
              uid = data.get('uid', 'NO_UID')
              if uid in MANAGED_UIDS:
                  print(f"  MANAGED : {os.path.basename(f)}  uid={uid}")
              else:
                  print(f"  ORPHAN  : {os.path.basename(f)}  uid={uid}  -> DELETING FILE")
                  os.remove(f)
          except Exception as e:
              print(f"  ERROR   : {f}: {e}")

      print("")
      print("=== Dashboard table (before cleanup) ===")
      conn = sqlite3.connect('/var/lib/grafana/grafana.db')
      c = conn.cursor()

      try:
          c.execute("SELECT id, uid, title, is_folder FROM dashboard ORDER BY is_folder, title")
      except sqlite3.OperationalError as e:
          print(f"  ERROR querying dashboard table: {e}")
          print("  Trying without is_folder column...")
          c.execute("SELECT id, uid, title FROM dashboard ORDER BY title")
          rows = [(id_, uid, title, None) for id_, uid, title in c.fetchall()]
      else:
          rows = c.fetchall()

      to_delete = []
      for id_, uid, title, is_folder in rows:
          ftype = 'FOLDER' if is_folder else 'DASH '
          managed = 'managed' if uid in MANAGED_UIDS else 'ORPHAN'
          print(f"  {ftype} [{managed}] uid={uid!r:45s} title={title!r}")
          if managed == 'ORPHAN' and not is_folder:
              to_delete.append((id_, uid, title))

      print("")
      print("=== Deleting unmanaged dashboards from DB ===")
      if not to_delete:
          print("  Nothing to delete")
      for id_, uid, title in to_delete:
          print(f"  Deleting: id={id_}  uid={uid}  title={title}")
          c.execute("DELETE FROM dashboard_provisioning WHERE dashboard_id=?", (id_,))
          print(f"    dashboard_provisioning rows removed: {conn.total_changes}")
          prev = conn.total_changes
          c.execute("DELETE FROM dashboard WHERE id=?", (id_,))
          print(f"    dashboard rows removed: {conn.total_changes - prev}")

      conn.commit()
      print(f"\nTotal deleted: {len(to_delete)} dashboard(s)")
      conn.close()
      PYEOF
  register: sqlite_purge
  changed_when: true

- name: Show SQLite purge output
  ansible.builtin.debug:
    var: sqlite_purge.stdout_lines

- name: Start Grafana after SQLite maintenance
  systemd:
    name: grafana-server
    state: started

# ── API purge: safety net for non-provisioned orphans ────────────────────

- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/health"
    status_code: 200
  register: grafana_health
  retries: 12
  delay: 5
  until: grafana_health.status == 200

- name: Get all dashboards from Grafana
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/search?type=dash-db&limit=100"
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    return_content: true
  register: all_grafana_dashboards

- name: Build list of unmanaged dashboard UIDs to purge
  ansible.builtin.set_fact:
    grafana_orphan_uids: >-
      {{ all_grafana_dashboards.json
         | selectattr('uid', 'defined')
         | rejectattr('uid', 'in', managed_dashboard_uids + [nef_uid])
         | map(attribute='uid')
         | list }}
  vars:
    managed_dashboard_uids:
      - lwa-blackbox-probes
      - lwa-k3s-cluster
      - lwa-reolink-nvr
      - lwa-snmp-interfaces
      - lwa-tmobile-gateway

- name: Delete each unmanaged dashboard (API)
  ansible.builtin.uri:
    url: "http://localhost:{{ port_grafana }}/api/dashboards/uid/{{ item }}"
    method: DELETE
    user: admin
    password: "{{ vault_grafana_password }}"
    force_basic_auth: true
    status_code: [200, 404]
  loop: "{{ grafana_orphan_uids }}"
