# Obelisk — Volumes
#
# obelisk-win11-iso  — PV + PVC backed by a pre-staged ISO on monolith
#                      PREREQUISITE: stage the Win11 ISO manually before
#                      running bootstrap-kubevirt.yml:
#
#                        scp Win11_25H2_English_x64_v2.iso \
#                          speddling@monolith:/mnt/ssd-b/obelisk-win11-iso/disk.img
#
#                      Microsoft session-authenticated download URLs are not
#                      stable — CDI cannot fetch them directly. The ISO must
#                      be obtained from microsoft.com/software-download/windows11
#                      and staged to monolith as a one-time prerequisite.
#
# obelisk-disk       — blank 80Gi DataVolume (CDI provisions this automatically)
#
# StorageClass: local-path on /mnt/ssd-b (isolated workspace drive)
# A dedicated StorageClass for ssd-b is defined in storage.yaml.

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: obelisk-win11-iso-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-path-ssd-b
  local:
    path: /mnt/ssd-b/obelisk-win11-iso
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - monolith

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obelisk-win11-iso
  namespace: obelisk
spec:
  storageClassName: local-path-ssd-b
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
  volumeName: obelisk-win11-iso-pv

---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: obelisk-disk
  namespace: obelisk
spec:
  source:
    blank: {}
  pvc:
    storageClassName: local-path-ssd-b
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 80Gi
