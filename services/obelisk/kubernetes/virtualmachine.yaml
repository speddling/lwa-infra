# Obelisk — KubeVirt VirtualMachine
#
# Windows 11 VM running on monolith, isolated on /mnt/ssd-b.
# Managed declaratively by ArgoCD — start/stop via virtctl or kubectl patch.
#
# Hardware config rationale:
#   - win-disk: SATA bus — OVMF UEFI can boot SATA natively, no driver needed
#   - network:  e1000e   — Windows has inbox drivers, no virtio-net required
#   - virtio-drivers ISO removed — not needed without virtio devices
#   - SecureBoot: off    — re-enable after confirmed clean boot
#   - EFI persistent     — NVRAM survives VM restarts, boot entries preserved
#
# First boot:
#   1. Bootstrap workflow stages volumes and applies manifests
#   2. ArgoCD syncs this manifest — VM starts, boots from win-iso (bootOrder 2)
#   3. autounattend.xml drives unattended install (~30-45 min)
#   4. VM reboots into Windows, runs FirstLogonCommands (RDP + windows_exporter)
#   5. RDP available at obelisk.littlewolfacres.com:33389
#
# Resource allocation:
#   CPU:    4 cores  (half of Ryzen 7 5700G 8c/16t)
#   Memory: 8Gi      (quarter of 32GB — leaves headroom for k3s workloads)
#
# To start:  virtctl start obelisk -n obelisk
# To stop:   virtctl stop obelisk -n obelisk
# Console:   virtctl vnc obelisk -n obelisk

---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: obelisk
  namespace: obelisk
  labels:
    app: obelisk
spec:
  running: true
  template:
    metadata:
      labels:
        app: obelisk
        kubevirt.io/vm: obelisk
    spec:
      domain:
        cpu:
          cores: 4
        memory:
          guest: 8Gi
        devices:
          disks:
            # Primary disk — SATA so OVMF can enumerate and boot it natively
            - name: win-disk
              bootOrder: 1
              disk:
                bus: sata
            # Windows 11 ISO — install source, bootOrder 2
            - name: win-iso
              bootOrder: 2
              cdrom:
                bus: sata
                readonly: true
            # autounattend ISO — drives unattended install
            - name: autounattend
              cdrom:
                bus: sata
                readonly: true
          interfaces:
            # e1000e — inbox Windows driver, no virtio-net needed
            - name: default
              model: e1000e
              masquerade: {}
          inputs:
            - type: tablet
              bus: usb
              name: tablet
        machine:
          type: q35
        features:
          smm:
            enabled: true
          hyperv:
            relaxed:
              enabled: true
            vapic:
              enabled: true
            spinlocks:
              enabled: true
              spinlocks: 8191
        firmware:
          bootloader:
            efi:
              # SecureBoot off — re-enable after confirmed clean boot
              secureBoot: false
              # Persist NVRAM so EFI boot entries survive VM restarts
              persistent: true
      networks:
        - name: default
          pod: {}
      volumes:
        - name: win-disk
          dataVolume:
            name: obelisk-disk
        - name: win-iso
          persistentVolumeClaim:
            claimName: obelisk-win11-iso
        - name: autounattend
          persistentVolumeClaim:
            claimName: obelisk-autounattend

---
# RDP NodePort — exposes port 3389 on monolith as 33389
apiVersion: v1
kind: Service
metadata:
  name: obelisk-rdp
  namespace: obelisk
spec:
  type: NodePort
  selector:
    kubevirt.io/vm: obelisk
  ports:
    - name: rdp
      port: 3389
      targetPort: 3389
      nodePort: 33389
      protocol: TCP

---
# windows_exporter NodePort — exposes port 9182 on monolith as 39182
apiVersion: v1
kind: Service
metadata:
  name: obelisk-metrics
  namespace: obelisk
spec:
  type: NodePort
  selector:
    kubevirt.io/vm: obelisk
  ports:
    - name: metrics
      port: 9182
      targetPort: 9182
      nodePort: 39182
      protocol: TCP
