# Obelisk — KubeVirt VirtualMachine
#
# Windows 11 Pro VM running on monolith, isolated on /mnt/ssd-b.
# Managed declaratively by ArgoCD — start/stop via virtctl or kubectl patch.
#
# First boot:
#   1. Bootstrap workflow applies DataVolumes — CDI downloads ISO (~6GB, ~10-20min)
#   2. ArgoCD syncs this manifest — VM starts, boots from ISO
#   3. autounattend.xml drives unattended install (~30-45min)
#   4. VM reboots into Windows, runs FirstLogonCommands (RDP + windows_exporter)
#   5. RDP available at obelisk.littlewolfacres.com:33389
#
# Subsequent boots: VM starts directly from obelisk-disk, ISO detached.
#
# Resource allocation:
#   CPU:    4 cores  (half of Ryzen 7 5700G's 8c/16t)
#   Memory: 8Gi      (quarter of 32GB — leaves headroom for k3s workloads)
#
# To start:  kubectl patch vm obelisk -n obelisk --type merge -p '{"spec":{"running":true}}'
# To stop:   kubectl patch vm obelisk -n obelisk --type merge -p '{"spec":{"running":false}}'
# Console:   virtctl vnc obelisk -n obelisk

---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: obelisk
  namespace: obelisk
  labels:
    app: obelisk
spec:
  running: true
  template:
    metadata:
      labels:
        app: obelisk
        kubevirt.io/vm: obelisk
    spec:
      domain:
        cpu:
          cores: 4
        memory:
          guest: 8Gi
        devices:
          disks:
            # Primary disk — Windows installation target
            - name: win-disk
              bootOrder: 1
              disk:
                bus: virtio
            # Windows 11 ISO — boot source for initial install
            - name: win-iso
              bootOrder: 2
              cdrom:
                bus: sata
                readonly: true
            # virtio drivers ISO — required for virtio disk/net on Windows
            - name: virtio-drivers
              cdrom:
                bus: sata
                readonly: true
            # autounattend ISO — drives unattended install on first boot
            # Built and uploaded by bootstrap-kubevirt.yml with vault passwords injected
            - name: autounattend
              cdrom:
                bus: sata
                readonly: true
          interfaces:
            - name: default
              model: virtio
              masquerade: {}
          # Enable tablet input for accurate mouse in VNC/RDP
          inputs:
            - type: tablet
              bus: usb
              name: tablet
        # Machine type for Win11 compatibility
        machine:
          type: q35
        # TPM required for Win11
        features:
          smm:
            enabled: true
          hyperv:
            relaxed:
              enabled: true
            vapic:
              enabled: true
            spinlocks:
              enabled: true
              spinlocks: 8191
        firmware:
          bootloader:
            efi:
              secureBoot: false
              persistent: true
      networks:
        - name: default
          pod: {}
      volumes:
        - name: win-disk
          dataVolume:
            name: obelisk-disk
        - name: win-iso
          persistentVolumeClaim:
            claimName: obelisk-win11-iso
        # virtio-win drivers — pulled from the official Fedora-hosted image
        - name: virtio-drivers
          containerDisk:
            image: quay.io/kubevirt/virtio-container-disk:v0.59.0
        # autounattend ISO — uploaded by bootstrap-kubevirt.yml
        - name: autounattend
          persistentVolumeClaim:
            claimName: obelisk-autounattend

---
# RDP NodePort — exposes port 3389 on monolith as 33389
# obelisk.littlewolfacres.com → 192.168.0.20:33389 (AdGuard rewrite)
apiVersion: v1
kind: Service
metadata:
  name: obelisk-rdp
  namespace: obelisk
spec:
  type: NodePort
  selector:
    kubevirt.io/vm: obelisk
  ports:
    - name: rdp
      port: 3389
      targetPort: 3389
      nodePort: 33389
      protocol: TCP

---
# windows_exporter NodePort — exposes port 9182 on monolith as 39182
# Prometheus on watchtower scrapes monolith:39182
apiVersion: v1
kind: Service
metadata:
  name: obelisk-metrics
  namespace: obelisk
spec:
  type: NodePort
  selector:
    kubevirt.io/vm: obelisk
  ports:
    - name: metrics
      port: 9182
      targetPort: 9182
      nodePort: 39182
      protocol: TCP
