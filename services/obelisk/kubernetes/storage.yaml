# Obelisk — StorageClass for /mnt/ssd-b
#
# Dedicated StorageClass that pins PVC provisioning to /mnt/ssd-b.
# The default local-path StorageClass uses /mnt/ssd-a (k8s workloads).
# Obelisk gets its own isolated drive as per the storage design.
#
# Requires a ConfigMap patch to local-path-provisioner to register
# the ssd-b path. Applied by bootstrap-kubevirt.yml before ArgoCD sync.

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path-ssd-b
provisioner: rancher.io/local-path
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  nodePath: /mnt/ssd-b
