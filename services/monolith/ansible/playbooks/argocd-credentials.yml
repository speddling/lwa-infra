---
# =============================================================================
# Rotate ArgoCD repository credentials for the homelab repo.
# =============================================================================
#
# Reads vault_argocd_github_token from the Ansible vault and patches the
# ArgoCD repository secret in-cluster. Restarts argocd-repo-server so the
# new credentials are picked up immediately without a full ArgoCD restart.
#
# This playbook is the single source of truth for ArgoCD repo credential
# lifecycle — both initial setup (post-bootstrap) and routine rotation.
#
# The bootstrap workflow (bootstrap-argocd.yml) handles first-ever secret
# creation from the ARGOCD_GITHUB_TOKEN GitHub Actions secret. Subsequent
# rotations should use this playbook exclusively.
#
# Run via GitHub Actions:
#   Actions → Rotate ArgoCD Credentials → Run workflow
#
# Run manually from apex:
#   cd services/monolith/ansible
#   ansible-playbook -i inventory.ini playbooks/argocd-credentials.yml \
#     --vault-password-file ~/lwa-homelab/.vault_pass
#
# Prerequisites:
#   - vault_argocd_github_token set in ansible/vars/vault.yml (encrypted)
#   - Fine-grained PAT scoped to speddling/lwa-homelab, Contents: Read only
#   - No expiration recommended — rotate on a schedule, not under pressure
# =============================================================================

- name: Rotate ArgoCD repository credentials
  hosts: monolith
  become: true

  vars_files:
    - "{{ playbook_dir }}/../../../../ansible/vars/main.yml"
    - "{{ playbook_dir }}/../../../../ansible/vars/vault.yml"

  tasks:

    - name: Write secret manifest to temp file
      # no_log prevents the token from appearing in Ansible output or CI logs.
      # The manifest is written root:root 0600 — unreadable by other users.
      copy:
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ argocd_repo_secret_name }}
            namespace: {{ argocd_namespace }}
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: {{ argocd_repo_url }}
            username: {{ argocd_repo_username }}
            password: "{{ vault_argocd_github_token }}"
        dest: /tmp/argocd-repo-secret.yaml
        mode: '0600'
        owner: root
        group: root
      no_log: true

    - name: Apply repository secret
      command: kubectl apply -f /tmp/argocd-repo-secret.yaml

    - name: Shred temp file
      # shred overwrites before unlinking — no plaintext PAT left on disk.
      command: shred -u /tmp/argocd-repo-secret.yaml

    - name: Restart argocd-repo-server
      # Forces immediate reload of the new credentials.
      # argocd-server and argocd-application-controller are unaffected.
      command: kubectl rollout restart deployment/argocd-repo-server -n {{ argocd_namespace }}

    - name: Wait for argocd-repo-server rollout
      command: >
        kubectl rollout status deployment/argocd-repo-server
        -n {{ argocd_namespace }}
        --timeout=120s

    - name: Verify repo-server pod is ready
      command: >
        kubectl get pods -n {{ argocd_namespace }}
        -l app.kubernetes.io/name=argocd-repo-server
      register: repo_server_status

    - name: Show repo-server pod status
      debug:
        var: repo_server_status.stdout_lines
