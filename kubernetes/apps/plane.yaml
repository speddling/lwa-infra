# Plane — self-hosted project/issue tracker (Community Edition, open source)
#
# Automated sync enabled. Confirmed healthy through a real first install:
# all 13 components (Postgres, Redis, RabbitMQ, MinIO, web, space, admin,
# live, api, worker, beat-worker) survived an OOMKill fix, a TLS
# misconfiguration, a missing secret key, and a Jinja2 templating bug
# upstream of this file — manual sync was the right call for that first
# boot, not for steady-state operation afterward. See
# docs/plane-deployment-plan.md for the full design and bootstrap
# sequence, and PRs #142/#144/#145/#146/#147 for what got fixed along
# the way.
#
# Secret field names confirmed via `helm show values makeplane/plane-ce`:
# a top-level `external_secrets:` map takes the literal NAME of a
# pre-existing Kubernetes Secret per logical group. The five secrets
# referenced below are created by bootstrap-plane.yml, never committed
# to git, and live only as Kubernetes Secret objects going forward.
#
# TLS: explicit cert-manager Certificate resource (kubernetes/apps/
# plane-certificate.yaml), applied by bootstrap-plane.yml — NOT the
# cert-manager.io/cluster-issuer annotation pattern used elsewhere in
# this repo. That annotation only works on standard Kubernetes Ingress
# objects (cert-manager's ingress-shim watches for it specifically);
# this chart generates a Traefik-native IngressRoute instead, a
# different CRD entirely, which ingress-shim never sees. An annotation
# under ingress.ingress_annotations here would silently do nothing.
# Also still deliberately not using the chart's own ssl.createIssuer
# automation, since that requires embedding the Cloudflare API token
# directly in this committed values block.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.plane.so/
    chart: plane-ce
    targetRevision: "*"   # TODO: pin to a specific version — run `helm search repo makeplane/plane-ce -l` and set explicitly
    helm:
      releaseName: plane   # explicit, not left to default inference — service DNS names below depend on this
      values: |
        planeVersion: stable

        ingress:
          enabled: true
          appHost: plane.littlewolfacres.com
          ingressClass: traefik
          ingress_annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "5m"

        ssl:
          createIssuer: false
          tls_secret_name: plane-tls

        postgres:
          local_setup: true
          storageClass: local-path
          volumeSize: 5Gi

        redis:
          local_setup: true
          storageClass: local-path
          volumeSize: 1Gi

        rabbitmq:
          local_setup: true
          storageClass: local-path
          volumeSize: 100Mi

        minio:
          local_setup: true
          storageClass: local-path
          volumeSize: 5Gi

        env:
          default_cluster_domain: cluster.local
          docstore_bucket: uploads
          doc_upload_size_limit: 5242880
          # Chart hardcodes WEB_URL as http://<appHost> with no override
          # field anywhere in values.yaml (confirmed via helm show values,
          # grepping for web_url/base_url/protocol/scheme/https — nothing).
          # cors_allowed_origins IS a real documented override, so fix that
          # one properly here. WEB_URL itself needs the ignoreDifferences
          # entry below plus a one-time live kubectl patch, since there's
          # no clean way to express "this is https-only" to this chart.
          cors_allowed_origins: "https://plane.littlewolfacres.com"

        external_secrets:
          pgdb_existingSecret: plane-pgdb-secret
          rabbitmq_existingSecret: plane-rabbitmq-secret
          doc_store_existingSecret: plane-docstore-secret
          app_env_existingSecret: plane-app-env-secret
          live_env_existingSecret: plane-live-env-secret

        # plane-worker OOMKilled (exitCode 137) against the chart's default
        # 1000Mi limit. Its Celery banner showed "concurrency: 16 (prefork)"
        # — 16 separate full-Python-process workers, not threads, each
        # loading the entire Django app independently. Celery's default
        # concurrency is the CPU count it detects, which on Monolith's
        # 8c/16t host is 16. Rather than fight that indirectly via CPU
        # limits (uncertain whether cgroup CPU quota reliably changes what
        # Celery detects), just give it real headroom — Monolith has it.
        worker:
          memoryLimit: 4096Mi
          memoryRequest: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # RespectIgnoreDifferences=true is the actual missing piece behind
      # the whole WEB_URL saga. ignoreDifferences alone (with or without
      # Replace=true, with either jqPathExpressions or jsonPointers
      # syntax) only suppresses the OutOfSync *status display* — per
      # ArgoCD's own docs, it does NOT by itself stop the field from
      # being overwritten during an actual sync/apply. That's a separate
      # opt-in, and this was the step missing the whole time.
      # Replace=true was tried and removed — it's incompatible with
      # ignoreDifferences below. ignoreDifferences only affects PATCH
      # computation; Replace does a full delete-and-recreate from
      # exactly what's rendered from git, so it silently wiped out the
      # live WEB_URL fix on every sync. That's a worse failure mode than
      # what Replace was solving (a loud, clear error) since it broke
      # the site silently instead.
      #
      # The tradeoff accepted instead: the plane-api-migrate Job embeds
      # a fresh timestamp annotation on every Helm render, and Job pod
      # templates are immutable post-creation, so a normal patch-based
      # sync will fail with "field is immutable" if that Job already
      # exists and the chart/values change in a way that re-triggers a
      # sync touching it. When that happens (rare — only on an actual
      # chart/values change, not routine reconciliation):
      #   kubectl delete job plane-api-migrate-1 -n plane
      # selfHeal will recreate it cleanly afterward, since creating a
      # missing Job doesn't hit the immutability conflict — only
      # patching an existing one does.
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # WEB_URL has no Helm override field in this chart (confirmed via
    # helm show values) — it's hardcoded to http://<appHost>, which
    # breaks self-referential redirects since this is HTTPS-only
    # (IngressRoute has no plain-HTTP entrypoint at all). Live-patched
    # to https:// once; ignored here so ArgoCD doesn't revert it back
    # to the chart's hardcoded default on the next sync.
    - group: ""
      kind: ConfigMap
      name: plane-app-vars
      namespace: plane
      jsonPointers:
        - /data/WEB_URL
