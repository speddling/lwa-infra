# cert-manager — cluster-level resources managed by ArgoCD
#
# Note: cert-manager CRDs and the controller itself are installed by the
# bootstrap workflow (kubectl apply of the upstream static manifest).
# ArgoCD adopts and manages the cluster-level config: namespace and
# ClusterIssuers.
#
# The cloudflare-api-token Secret is intentionally excluded from ArgoCD
# management — it contains sensitive credentials injected by the bootstrap
# workflow and must not be overwritten by GitOps sync. It is managed
# out-of-band (bootstrap workflow → kubectl create secret).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/speddling/lwa-homelab
    targetRevision: master
    path: kubernetes/cluster/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: cloudflare-api-token
      namespace: cert-manager
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for CRD-backed resources like ClusterIssuer
