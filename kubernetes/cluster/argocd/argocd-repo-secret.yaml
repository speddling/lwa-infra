# ArgoCD Repository Secret — homelab repo access
#
# Configures ArgoCD to pull manifests from the private speddling/lwa-homelab repo.
# Uses a GitHub Fine-grained PAT with Contents: Read scope on this repo only.
#
# Secret lifecycle:
#   INITIAL CREATION — bootstrap-argocd.yml workflow (runs once, manual)
#     Injects ARGOCD_GITHUB_TOKEN GitHub Actions secret into the cluster.
#
#   ONGOING ROTATION — rotate-argocd-credentials.yml workflow
#     Reads vault_argocd_github_token from ansible/vars/vault.yml (encrypted)
#     and patches this secret in-cluster. Run after any PAT rotation.
#     Also runs on a quarterly schedule as a rotation reminder.
#
# THIS FILE IS A PLACEHOLDER — the live secret is managed out-of-band.
# Do not manage this secret via ArgoCD sync (circular dependency).
#
# PAT requirements:
#   Type:       Fine-grained personal access token
#   Repository: speddling/lwa-homelab only
#   Permission: Contents → Read
#   Expiration: No expiration (preferred) — rotate on schedule, not under pressure

apiVersion: v1
kind: Secret
metadata:
  name: homelab-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/speddling/lwa-homelab
  username: speddling
  password: PLACEHOLDER_SET_BY_BOOTSTRAP_WORKFLOW
