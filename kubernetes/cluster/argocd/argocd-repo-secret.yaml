# ArgoCD Repository Secret — homelab repo access
#
# Configures ArgoCD to pull manifests from the private speddling/homelab repo.
# Uses a GitHub Personal Access Token (PAT) with repo read scope.
#
# THIS FILE IS A PLACEHOLDER — the actual token is injected by the bootstrap
# workflow from the ARGOCD_GITHUB_TOKEN GitHub Actions secret.
#
# PAT requirements:
#   Scope: Contents → Read (minimum)
#   Classic PAT or Fine-grained PAT scoped to speddling/homelab
#
# The bootstrap workflow creates this secret before applying the App of Apps.

apiVersion: v1
kind: Secret
metadata:
  name: homelab-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/speddling/homelab
  username: speddling
  password: PLACEHOLDER_SET_BY_BOOTSTRAP_WORKFLOW
