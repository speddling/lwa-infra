# ArgoCD metrics NodePort Services
#
# Exposes ArgoCD internal metrics on NodePorts so Prometheus on Watchtower
# (192.168.0.21) can scrape them without an in-cluster Prometheus.
#
# Scrape targets in prometheus.yml.j2:
#   argocd-app-controller: monolith.littlewolfacres.com:30882
#   argocd-server-metrics:  monolith.littlewolfacres.com:30883
#
# Key metrics:
#   argocd_app_info{health_status, sync_status} — app health and sync state
#   argocd_app_reconcile_count                  — reconciliation activity
#   argocd_cluster_api_resource_objects         — cluster resource counts
#
# Port reservations (see ansible/vars/main.yml):
#   30882 — argocd-application-controller metrics
#   30883 — argocd-server metrics

---
apiVersion: v1
kind: Service
metadata:
  name: argocd-application-controller-metrics
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller-metrics
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: application-controller
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-application-controller
  ports:
    - name: metrics
      port: 8082
      targetPort: 8082
      nodePort: 30882

---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-metrics
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server-metrics
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: server
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: metrics
      port: 8083
      targetPort: 8083
      nodePort: 30883
