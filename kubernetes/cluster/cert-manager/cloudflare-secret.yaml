# Cloudflare API Token Secret for cert-manager DNS-01 challenges
#
# THIS FILE IS A PLACEHOLDER — the actual secret is created by the bootstrap
# workflow from the CLOUDFLARE_API_TOKEN GitHub Actions secret. This file
# is intentionally not committed with a real value.
#
# The bootstrap workflow runs:
#   kubectl create secret generic cloudflare-api-token \
#     --namespace cert-manager \
#     --from-literal=api-token=${{ secrets.CLOUDFLARE_API_TOKEN }} \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Token permissions (scoped to littlewolfacres.com zone only):
#   Zone:DNS → Edit
#   Zone:Zone → Read
#
# How it works:
#   1. cert-manager receives a Certificate or Ingress TLS request
#   2. It creates a DNS-01 ACME challenge record in Cloudflare via the API
#   3. Let's Encrypt verifies the TXT record exists
#   4. cert-manager deletes the challenge record
#   5. Certificate is stored as a Kubernetes Secret and mounted by Traefik
#
# No inbound port 80 or 443 required — DNS-01 is fully outbound.

apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: PLACEHOLDER_SET_BY_BOOTSTRAP_WORKFLOW
