# Let's Encrypt Staging ClusterIssuer
#
# Use for testing cert-manager configuration without hitting Let's Encrypt
# rate limits. Staging certs are NOT trusted by browsers — they'll show
# a certificate warning, which is expected.
#
# To use staging on the ArgoCD ingress temporarily:
#   Change cert-manager.io/cluster-issuer annotation to: letsencrypt-staging
#
# Switch to letsencrypt-prod once you've confirmed DNS-01 challenge succeeds.
# Rate limits: https://letsencrypt.org/docs/staging-environment/

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: info@littlewolfacres.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
