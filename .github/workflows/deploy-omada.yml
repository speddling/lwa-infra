name: Deploy Omada Config

# Phase 1: read-only state export. This workflow authenticates to the
# Omada Open API and writes controller state to services/omada/state/.
# It makes NO changes to the controller yet. The reconcile (write) phase
# will be added once endpoint coverage is confirmed.
#
# Runs on the watchtower self-hosted runner because watchtower is the
# network-management node and (post-cutover) the only host allowed to
# reach the OC200 API per the Infra->OC200 TCP 443 ACL.

on:
  push:
    branches: [master]
    paths:
      - 'services/omada/**'
      - 'ansible/vars/**'
      - '.github/workflows/deploy-omada.yml'
  pull_request:
    branches: [master]
    paths:
      - 'services/omada/**'
      - 'ansible/vars/**'
      - '.github/workflows/deploy-omada.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: [self-hosted, watchtower]
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs
          pip3 install --break-system-packages 'ansible-core>=2.18'

      - name: Syntax-check export playbook
        working-directory: services/omada/ansible
        run: ansible-playbook -i inventory.ini playbooks/export.yml --syntax-check

  export:
    name: Export controller state (read-only)
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, watchtower]
    permissions:
      contents: write   # allow the commit-back step to push state to master
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs
          pip3 install --break-system-packages 'ansible-core>=2.18'

      - name: Run Ansible — Omada state export
        working-directory: services/omada/ansible
        run: ansible-playbook -i inventory.ini playbooks/export.yml

      # Commit refreshed state back to the repo so the controller config
      # is versioned (config-as-backup). No-op when nothing changed.
      - name: Commit refreshed state
        run: |
          git config user.name  "omada-export-bot"
          git config user.email "omada-export-bot@littlewolfacres.com"
          git add services/omada/state
          if ! git diff --cached --quiet -- services/omada/state; then
            git commit -m "chore(omada): refresh controller state export [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
