name: Deploy Omada Config

# Read-only introspection of the Omada controller via the Open API.
# This is NOT a backup and does NOT commit anything. It exists to show
# the controller's current state (sites, devices) so that desired-state
# declarations can be authored for the reconcile phase.
#
# The repo itself is the source of truth and the recovery path: the
# controller is rebuilt by declaring its config as code and reconciling
# it onto the OC200 — there is nothing to "back up" separately.
#
# Runs on the watchtower self-hosted runner (the network-management node;
# post-cutover the only host allowed to reach the OC200 API per the
# Infra->OC200 TCP 443 ACL). State is written to the runner workspace for
# inspection during a run; it is intentionally not persisted to the repo.

on:
  pull_request:
    branches: [master]
    paths:
      - 'services/omada/**'
      - 'ansible/vars/**'
      - '.github/workflows/deploy-omada.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: [self-hosted, watchtower]
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs
          pip3 install --break-system-packages 'ansible-core>=2.18'

      - name: Syntax-check export playbook
        working-directory: services/omada/ansible
        run: ansible-playbook -i inventory.ini playbooks/export.yml --syntax-check

  export:
    name: Export controller state (read-only introspection)
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, watchtower]
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs
          pip3 install --break-system-packages 'ansible-core>=2.18'

      - name: Run Ansible — Omada state export (read-only)
        working-directory: services/omada/ansible
        run: ansible-playbook -i inventory.ini playbooks/export.yml

      # State is written to services/omada/state/ in the runner workspace
      # for inspection in this run's log/artifacts. It is NOT committed —
      # the repo holds authored desired-state, not machine-generated dumps.
      - name: Show exported state
        working-directory: services/omada
        run: |
          echo "=== Exported controller state (this run only) ==="
          for f in state/sites.json state/devices-*.json; do
            echo "----- $f -----"
            cat "$f"
            echo
          done
