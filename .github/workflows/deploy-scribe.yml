name: Deploy Scribe

on:
  push:
    branches:
      - main
    paths:
      # Re-deploy whenever the server, its deps, the Ansible role, or this
      # workflow itself changes.
      - "services/apex/scribe/**"
      - "services/apex/ansible/**"
      - ".github/workflows/deploy-scribe.yml"

  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Scribe to apex
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the repo so we can drive Ansible from the runner
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Install Ansible on the runner
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      # -----------------------------------------------------------------------
      # 3. Write the SSH private key that can reach apex
      # -----------------------------------------------------------------------
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.APEX_SSH_KEY }}" > ~/.ssh/apex_deploy
          chmod 600 ~/.ssh/apex_deploy
          # Trust the host so ansible doesn't prompt
          ssh-keyscan -H apex.littlewolfacres.com >> ~/.ssh/known_hosts 2>/dev/null || true

      # -----------------------------------------------------------------------
      # 4. Run the Ansible playbook against apex
      #
      #    The playbook is self-contained and runs against 'localhost' on apex
      #    via an SSH connection. We override the inventory inline so we don't
      #    need to change the local ansible.cfg.
      # -----------------------------------------------------------------------
      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_FORCE_COLOR: "1"
        run: |
          ansible-playbook \
            -i "apex.littlewolfacres.com," \
            --user speddling \
            --private-key ~/.ssh/apex_deploy \
            --extra-vars "ansible_connection=ssh" \
            --extra-vars "scribe_src_dir=/Users/speddling/homelab/services/apex/scribe" \
            services/apex/ansible/playbooks/scribe.yml \
            -v

      # -----------------------------------------------------------------------
      # 5. Verify the service is reachable (basic health-check over SSH)
      # -----------------------------------------------------------------------
      - name: Smoke-test Scribe endpoint
        run: |
          ssh -i ~/.ssh/apex_deploy \
              -o StrictHostKeyChecking=no \
              speddling@apex.littlewolfacres.com \
              "curl --silent --fail --max-time 5 http://localhost:${{ vars.SCRIBE_PORT || 8765 }}/mcp \
               && echo 'Scribe is up' \
               || (echo 'Scribe health-check failed'; exit 1)"
