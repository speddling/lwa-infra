name: Deploy Synapse

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, monolith]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: services/synapse/server
          file: services/synapse/server/Dockerfile
          push: true
          tags: |
            ghcr.io/speddling/synapse:${{ github.sha }}
            ghcr.io/speddling/synapse:latest

      - name: Create ghcr pull secret in synapse namespace
        run: |
          kubectl create namespace synapse --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace=synapse \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f services/synapse/kubernetes/namespace.yaml
          kubectl apply -f services/synapse/kubernetes/rbac.yaml
          kubectl apply -f services/synapse/kubernetes/configmap.yaml
          kubectl apply -f services/synapse/kubernetes/deployment.yaml
          kubectl apply -f services/synapse/kubernetes/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/synapse --namespace=synapse --timeout=120s

      - name: Open UFW for apex → Synapse NodePort
        run: |
          sudo ufw allow from 192.168.0.19 to any port 30800 proto tcp comment 'Synapse MCP — apex only'
          sudo ufw reload

      - name: Verify
        run: |
          kubectl get pods -n synapse
          kubectl get svc -n synapse
          curl -sf http://localhost:30800/health && echo "Health check passed"
