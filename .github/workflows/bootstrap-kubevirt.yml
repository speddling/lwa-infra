name: Bootstrap KubeVirt

# Manual trigger only — runs once to install KubeVirt + CDI and provision
# the Obelisk Windows 11 VM. After this workflow completes, ArgoCD manages
# the VM declaratively.
#
# Prerequisites:
#   - k3s running on monolith
#   - ArgoCD bootstrapped (bootstrap-argocd.yml already run)
#   - /mnt/ssd-b mounted and writable on monolith
#   - ANSIBLE_VAULT_PASSWORD secret set in GitHub Actions
#   - Win11 ISO pre-staged on monolith:
#       scp Win11_25H2_English_x64_v2.iso \
#         speddling@monolith:/mnt/ssd-b/obelisk-win11-iso/disk.img
#     (Microsoft download URLs are session-authenticated and cannot be
#      fetched directly by CDI — stage once, reuse forever)
#
# What this does:
#   1. Preflight: verify Win11 ISO is staged on monolith
#   2. Install KubeVirt + CDI operators via Ansible
#   3. Patch local-path-provisioner to register /mnt/ssd-b
#   4. Apply StorageClass for ssd-b
#   5. Build autounattend ISO with vault passwords injected
#   6. Upload autounattend ISO as a PVC
#   7. Apply volumes (win11 PV+PVC + blank disk DataVolume)
#   8. Wait for obelisk-disk DataVolume to be Succeeded
#   9. Set VM running:true — Windows install begins automatically
#
# After this workflow, Windows installs unattended (~30-45 min).
# RDP available at obelisk.littlewolfacres.com:33389 when complete.
# Monitor install via: virtctl vnc obelisk -n obelisk

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Bootstrap KubeVirt + Obelisk
    runs-on: [self-hosted, monolith]

    steps:
      - uses: actions/checkout@v4

      - name: Preflight — verify Win11 ISO is staged
        run: |
          ISO_PATH="/mnt/ssd-b/obelisk-win11-iso/disk.img"
          if [ ! -f "${ISO_PATH}" ]; then
            echo "❌ Win11 ISO not found at ${ISO_PATH}"
            echo ""
            echo "Stage the ISO before running this workflow:"
            echo "  scp Win11_25H2_English_x64_v2.iso \\"
            echo "    speddling@monolith:/mnt/ssd-b/obelisk-win11-iso/disk.img"
            exit 1
          fi
          ISO_SIZE=$(stat -c%s "${ISO_PATH}")
          MIN_SIZE=$((5 * 1024 * 1024 * 1024))
          if [ "${ISO_SIZE}" -lt "${MIN_SIZE}" ]; then
            echo "❌ ISO at ${ISO_PATH} is ${ISO_SIZE} bytes — looks incomplete (expected >5GB)"
            exit 1
          fi
          echo "✅ Win11 ISO found: $(numfmt --to=iec ${ISO_SIZE})"

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible genisoimage python3-yaml
          ansible-galaxy collection install community.general

      # ── Step 1: Install KubeVirt + CDI ────────────────────────────────────

      - name: Run kubevirt bootstrap role
        working-directory: services/monolith/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/kubevirt.yml \
            --vault-password-file ~/lwa-homelab/.vault_pass

      # ── Step 2: Configure storage ──────────────────────────────────────────

      - name: Patch local-path-provisioner to register /mnt/ssd-b
        run: |
          kubectl patch configmap local-path-config -n kube-system --type merge -p '{
            "data": {
              "config.json": "{\"nodePathMap\":[{\"node\":\"DEFAULT_PATH_FOR_NON_LISTED_NODES\",\"paths\":[\"/mnt/ssd-a\"]},{\"node\":\"monolith\",\"paths\":[\"/mnt/ssd-a\",\"/mnt/ssd-b\"]}]}"
            }
          }'

      - name: Apply StorageClass for ssd-b
        run: kubectl apply -f services/obelisk/kubernetes/storage.yaml

      # ── Step 3: Build autounattend ISO with injected passwords ─────────────

      - name: Decrypt vault and extract passwords
        run: |
          # Decrypt vault, extract the two obelisk passwords, write to env file
          ansible-vault decrypt ansible/vars/vault.yml \
            --vault-password-file ~/lwa-homelab/.vault_pass \
            --output /tmp/vault-plain.yml
          OBELISK_PASS=$(python3 -c "
          import yaml
          with open('/tmp/vault-plain.yml') as f:
              v = yaml.safe_load(f)
          print(v['vault_obelisk_admin_password'])
          ")
          SPEDDLING_PASS=$(python3 -c "
          import yaml
          with open('/tmp/vault-plain.yml') as f:
              v = yaml.safe_load(f)
          print(v['vault_speddling_obelisk_password'])
          ")
          # Write to masked env file — never echoed to logs
          echo "OBELISK_PASS=${OBELISK_PASS}" >> /tmp/obelisk-env
          echo "SPEDDLING_PASS=${SPEDDLING_PASS}" >> /tmp/obelisk-env
          chmod 600 /tmp/obelisk-env
          # Shred plaintext vault immediately
          shred -u /tmp/vault-plain.yml

      - name: Inject passwords into autounattend.xml and build ISO
        run: |
          source /tmp/obelisk-env
          mkdir -p /tmp/autounattend-iso

          # Inject passwords — sed with delimiter | to avoid issues with special chars
          sed \
            -e "s|OBELISK_ADMIN_PASSWORD_PLACEHOLDER|${OBELISK_PASS}|g" \
            -e "s|SPEDDLING_PASSWORD_PLACEHOLDER|${SPEDDLING_PASS}|g" \
            services/obelisk/autounattend.xml > /tmp/autounattend-iso/autounattend.xml

          # Build ISO
          genisoimage \
            -o /tmp/autounattend.iso \
            -J -r \
            /tmp/autounattend-iso/

          # Shred env file and injected xml
          shred -u /tmp/obelisk-env
          shred -u /tmp/autounattend-iso/autounattend.xml
          rmdir /tmp/autounattend-iso

      - name: Copy autounattend ISO to node and create PVC
        run: |
          # Runner runs on monolith — copy ISO directly to ssd-b
          sudo mkdir -p /mnt/ssd-b/obelisk-autounattend
          sudo cp /tmp/autounattend.iso /mnt/ssd-b/obelisk-autounattend/disk.img
          sudo chmod 644 /mnt/ssd-b/obelisk-autounattend/disk.img
          shred -u /tmp/autounattend.iso

          # Create PV + PVC backed by the file we just copied
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: obelisk-autounattend-pv
          spec:
            capacity:
              storage: 10Mi
            accessModes:
              - ReadWriteOnce
            persistentVolumeReclaimPolicy: Retain
            storageClassName: local-path-ssd-b
            hostPath:
              path: /mnt/ssd-b/obelisk-autounattend
              type: Directory
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: obelisk-autounattend
            namespace: obelisk
          spec:
            storageClassName: local-path-ssd-b
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Mi
            volumeName: obelisk-autounattend-pv
          EOF

      # ── Step 4: Provision Win11 ISO + disk ────────────────────────────────

      - name: Apply volumes (win11 ISO PV+PVC + blank disk DataVolume)
        run: |
          # Create ssd-b path for blank disk — win11-iso path already exists
          # (ISO was pre-staged there as a prerequisite)
          sudo mkdir -p /mnt/ssd-b/obelisk-disk

          # Create disk PV manually — local-path-provisioner can't provision
          # Immediate PVCs without a node hint
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: obelisk-disk-pv
          spec:
            capacity:
              storage: 80Gi
            accessModes:
              - ReadWriteOnce
            persistentVolumeReclaimPolicy: Retain
            storageClassName: local-path-ssd-b
            local:
              path: /mnt/ssd-b/obelisk-disk
            nodeAffinity:
              required:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - monolith
          EOF

          # Apply datavolumes.yaml — creates win11 PV+PVC and blank disk DataVolume
          kubectl apply -f services/obelisk/kubernetes/datavolumes.yaml

      - name: Wait for all DataVolumes to be Succeeded
        run: |
          echo "Waiting for obelisk-disk DataVolume to be ready..."
          for dv in obelisk-disk; do
            kubectl wait datavolume/${dv} -n obelisk \
              --for=jsonpath='{.status.phase}'=Succeeded \
              --timeout=1800s
            echo "${dv}: Succeeded"
          done

      # ── Step 5: Start the VM — Windows install begins ─────────────────────

      - name: Start VM — Windows unattended install begins
        run: |
          # Wait for ArgoCD to sync the VM manifest before patching
          echo "Waiting for ArgoCD to sync obelisk VM manifest..."
          for i in $(seq 1 24); do
            if kubectl get vm obelisk -n obelisk &>/dev/null; then
              echo "✅ VM manifest found"
              break
            fi
            echo "  attempt ${i}/24 — waiting 5s..."
            sleep 5
          done
          kubectl get vm obelisk -n obelisk || { echo "❌ VM manifest never appeared — check ArgoCD sync"; exit 1; }

          kubectl patch vm obelisk -n obelisk \
            --type merge -p '{"spec":{"running":true}}'
          echo ""
          echo "✅ Obelisk VM started. Windows is installing unattended (~30-45 min)."
          echo ""
          echo "Monitor install:  virtctl vnc obelisk -n obelisk"
          echo "RDP when ready:   obelisk.littlewolfacres.com:33389"
          echo "Credentials:      obelisk / <vault_obelisk_admin_password>"
          echo "                  speddling / <vault_speddling_obelisk_password>"
