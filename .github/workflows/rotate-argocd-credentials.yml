name: Rotate ArgoCD Credentials

# =============================================================================
# Rotates the GitHub PAT used by ArgoCD to pull manifests from speddling/lwa-homelab.
#
# Source of truth: vault_argocd_github_token in ansible/vars/vault.yml (encrypted).
# The Ansible playbook reads the vault, writes a 0600 temp file, applies it to
# the cluster via kubectl, shreds the temp file, and restarts argocd-repo-server.
#
# When to run:
#   - After generating a new GitHub fine-grained PAT
#   - On the scheduled quarterly reminder (even if the PAT hasn't expired —
#     routine rotation is better than emergency rotation)
#   - After any suspected credential exposure
#
# PAT requirements (set once, rotate on schedule):
#   Type:        Fine-grained personal access token
#   Repository:  speddling/lwa-homelab only
#   Permission:  Contents → Read
#   Expiration:  No expiration (preferred) or 1 year minimum
#
# Rotation procedure:
#   1. Generate new PAT at GitHub → Settings → Developer Settings →
#      Fine-grained tokens → Generate new token
#   2. Update the vault on apex:
#        ansible-vault edit ansible/vars/vault.yml \
#          --vault-password-file ~/lwa-homelab/.vault_pass
#        # update vault_argocd_github_token
#   3. Commit the encrypted vault change and push to master
#   4. Run this workflow: Actions → Rotate ArgoCD Credentials → Run workflow
# =============================================================================

on:
  workflow_dispatch:
    # Manual trigger — run after updating vault_argocd_github_token in vault.yml
    # and pushing to master. See rotation procedure above.

  schedule:
    # Quarterly reminder at 09:00 ET on the first day of Jan, Apr, Jul, Oct.
    # Even with a no-expiration PAT, routine rotation limits exposure window.
    # The workflow will no-op if vault_argocd_github_token hasn't changed.
    - cron: '0 14 1 1,4,7,10 *'

jobs:

  validate:
    name: Validate
    runs-on: [self-hosted, monolith]

    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Syntax check
        working-directory: services/monolith/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/argocd-credentials.yml \
            --syntax-check \
            --vault-password-file ~/lwa-homelab/.vault_pass

  rotate:
    name: Rotate credentials
    needs: validate
    runs-on: [self-hosted, monolith]

    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Run Ansible — Rotate ArgoCD credentials
        working-directory: services/monolith/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/argocd-credentials.yml \
            --vault-password-file ~/lwa-homelab/.vault_pass

      - name: Verify ArgoCD applications are syncing
        run: |
          echo "=== ArgoCD repo-server pod status ==="
          kubectl get pods -n argocd -l app.kubernetes.io/name=argocd-repo-server
          echo ""
          echo "=== ArgoCD application sync status ==="
          kubectl get applications -n argocd
