name: Deploy Watchtower Config

on:
  push:
    branches: [master]
    paths:
      - 'services/watchtower/**'
      - 'terraform/watchtower/**'
      - '.github/workflows/deploy-watchtower.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, watchtower]
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/homelab/.vault_pass
          chmod 600 ~/homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unzip ansible nodejs

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init & Apply
        working-directory: terraform/watchtower
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Run Ansible — DNS
        working-directory: services/watchtower/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/dns.yml

      - name: Run Ansible — Exporters
        working-directory: services/watchtower/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/exporters.yml

      - name: Run Ansible — Monitoring
        working-directory: services/watchtower/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/monitoring.yml
