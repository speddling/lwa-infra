name: Deploy Watchtower Config

on:
  push:
    branches: [master]
    paths:
      - 'services/watchtower/**'
      - 'terraform/watchtower/**'
      - 'ansible/vars/**'
      - '.github/workflows/deploy-watchtower.yml'
  pull_request:
    branches: [master]
    paths:
      - 'services/watchtower/**'
      - 'terraform/watchtower/**'
      - 'ansible/vars/**'
      - '.github/workflows/deploy-watchtower.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: [self-hosted, watchtower]
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unzip nodejs
          pip3 install --break-system-packages 'ansible-core>=2.18'

      - name: Lint Ansible playbooks
        working-directory: services/watchtower/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/dns.yml --syntax-check
          ansible-playbook -i inventory.ini playbooks/exporters.yml --syntax-check
          ansible-playbook -i inventory.ini playbooks/monitoring.yml --syntax-check

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init & Validate
        working-directory: terraform/watchtower
        run: |
          terraform init
          terraform validate

  deploy:
    name: Deploy
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, watchtower]
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unzip nodejs
          pip3 install --break-system-packages 'ansible-core>=2.18'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init & Apply
        working-directory: terraform/watchtower
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Run Ansible — DNS
        working-directory: services/watchtower/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/dns.yml

      - name: Run Ansible — Exporters
        working-directory: services/watchtower/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/exporters.yml

      - name: Run Ansible — Monitoring
        working-directory: services/watchtower/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/monitoring.yml
