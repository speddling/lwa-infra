name: Deploy Monolith Config

on:
  push:
    branches: [master]
    paths:
      - 'services/monolith/ansible/**'
      - 'ansible/vars/**'
      - '.github/workflows/deploy-monolith.yml'
  pull_request:
    branches: [master]
    paths:
      - 'services/monolith/ansible/**'
      - 'ansible/vars/**'
      - '.github/workflows/deploy-monolith.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: [self-hosted, monolith]
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.general

      - name: Lint playbooks
        working-directory: services/monolith/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/firewall.yml --syntax-check
          ansible-playbook -i inventory.ini playbooks/monitoring.yml --syntax-check

  deploy:
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, monolith]
    steps:
      - uses: actions/checkout@v4

      - name: Write vault password
        run: |
          mkdir -p ~/lwa-homelab
          echo '${{ secrets.ANSIBLE_VAULT_PASSWORD }}' > ~/lwa-homelab/.vault_pass
          chmod 600 ~/lwa-homelab/.vault_pass

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible
          ansible-galaxy collection install community.general

      - name: Run Ansible — Firewall
        working-directory: services/monolith/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/firewall.yml \
            --vault-password-file ~/lwa-homelab/.vault_pass

      - name: Run Ansible — Monitoring agents
        working-directory: services/monolith/ansible
        run: |
          ansible-playbook -i inventory.ini playbooks/monitoring.yml \
            --vault-password-file ~/lwa-homelab/.vault_pass
